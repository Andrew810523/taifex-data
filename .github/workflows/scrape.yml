name: Scrape Daily Data

on:
  schedule:
    # 15:15 CST = 07:15 UTC  (週一到週五，台股收盤後第一輪：抓取大部分資料)
    - cron: '15 7 * * 1-5'
    # 21:30 CST = 13:30 UTC  (週一到週五，第二輪：補抓融資融券)
    - cron: '30 13 * * 1-5'

  # 允許從 GitHub 網頁手動觸發 (測試用)
  workflow_dispatch:
    inputs:
      date:
        description: '目標日期 YYYYMMDD (留空 = 今日)'
        required: false
        default: ''

permissions:
  contents: write   # 需要 push commit 回 repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Taipei

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check trading day
        id: check
        run: python trading_day.py "${{ github.event.inputs.date }}"

      - name: Exit if not trading day
        if: steps.check.outputs.is_trading != 'true'
        run: |
          echo "::notice::非交易日 (${{ steps.check.outputs.date }})，跳過"
          exit 0

      - name: Run scraper
        if: steps.check.outputs.is_trading == 'true'
        run: python scraper.py "${{ steps.check.outputs.date }}"

      - name: Export JSON
        if: steps.check.outputs.is_trading == 'true'
        run: python export_json.py

      - name: Commit & push
        if: steps.check.outputs.is_trading == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ "籌碼資料.xlsx"
          if git diff --staged --quiet; then
            echo "::notice::沒有變動，不 commit"
          else
            git commit -m "data: ${{ steps.check.outputs.date }} ($(date +%H:%M))"
            git push
          fi

      - name: Telegram notify
        if: steps.check.outputs.is_trading == 'true'
        env:
          NOTIFY_WORKER_URL: ${{ secrets.NOTIFY_WORKER_URL }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python notify.py
